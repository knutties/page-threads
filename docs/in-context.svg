<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" width="940" height="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="A browser window showing a news article with the PageThreads side panel docked on the right (illustration)">
  <defs>
    <filter id="win-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0c0a10" flood-opacity="0.22"/>
    </filter>
    <clipPath id="win"><rect x="10" y="10" width="920" height="540" rx="12"/></clipPath>
  </defs>

  <rect width="940" height="560" fill="#eceaf0"/>
  <rect x="10" y="10" width="920" height="540" rx="12" fill="#ffffff" filter="url(#win-shadow)"/>

  <g clip-path="url(#win)">
    <rect x="10" y="10" width="920" height="540" fill="#ffffff"/>

    <!-- browser chrome -->
    <rect x="10" y="10" width="920" height="52" fill="#ededf0"/>
    <circle cx="34" cy="36" r="6" fill="#ff5f57"/>
    <circle cx="54" cy="36" r="6" fill="#febc2e"/>
    <circle cx="74" cy="36" r="6" fill="#28c840"/>
    <!-- address bar -->
    <rect x="300" y="23" width="470" height="26" rx="13" fill="#ffffff" stroke="#dcdce1"/>
    <text x="316" y="40" font-size="12" fill="#5a5a66">🔒</text>
    <text x="338" y="40" font-size="12.5" fill="#3a3a44">www.rediff.com/cricket/report/ind-t20i-no1</text>
    <!-- PageThreads toolbar icon (active) -->
    <rect x="878" y="21" width="30" height="30" rx="8" fill="#f3e9f4" stroke="#3f0e40" stroke-opacity="0.4"/>
    <rect x="885" y="29" width="16" height="12" rx="3" fill="#3f0e40"/>
    <path d="M889 41 l4 5 l0 -5 z" fill="#3f0e40"/>
    <circle cx="903" cy="27" r="5" fill="#e01e5a"/>
    <text x="903" y="30.5" font-size="7" fill="#fff" font-weight="700" text-anchor="middle">3</text>

    <!-- ===== web page (left) ===== -->
    <text x="34" y="92" font-size="11" font-weight="700" fill="#c8102e" letter-spacing="1.2">REDIFF · CRICKET</text>
    <text x="34" y="126" font-size="24" font-weight="800" fill="#17171b">India lose No.1 T20I ranking</text>
    <text x="34" y="156" font-size="24" font-weight="800" fill="#17171b">after series defeat</text>
    <text x="34" y="180" font-size="12.5" fill="#71717a">By Sports Desk · 3 hours ago · 4 min read</text>

    <!-- hero image placeholder -->
    <rect x="34" y="196" width="566" height="150" rx="8" fill="#e7ecf2"/>
    <circle cx="317" cy="258" r="20" fill="#cfd8e3"/>
    <path d="M296 300 l34 -40 l24 26 l18 -20 l30 34 z" fill="#cfd8e3"/>
    <circle cx="352" cy="240" r="9" fill="#dbe3ec"/>

    <!-- body text (gray bars) -->
    <g fill="#e4e4ea">
      <rect x="34" y="368" width="566" height="9" rx="4"/>
      <rect x="34" y="386" width="566" height="9" rx="4"/>
      <rect x="34" y="404" width="524" height="9" rx="4"/>
      <rect x="34" y="430" width="300" height="12" rx="4" fill="#d3d3db"/>
      <rect x="34" y="456" width="566" height="9" rx="4"/>
      <rect x="34" y="474" width="566" height="9" rx="4"/>
      <rect x="34" y="492" width="480" height="9" rx="4"/>
      <rect x="34" y="510" width="566" height="9" rx="4"/>
    </g>

    <!-- ===== docked side panel (right) ===== -->
    <rect x="630" y="62" width="300" height="488" fill="#ffffff"/>
    <line x1="630" y1="62" x2="630" y2="550" stroke="#e2e2e8"/>
    <rect x="630" y="62" width="4" height="488" fill="#00000010"/>

    <!-- panel header -->
    <rect x="634" y="62" width="296" height="50" fill="#3f0e40"/>
    <text x="650" y="88" fill="#ffffff" font-size="12.5" font-weight="700">India lose No.1 T20I ranking</text>
    <text x="650" y="104" fill="#ffffff" fill-opacity="0.72" font-size="10.5">rediff.com · 5 messages</text>
    <text x="914" y="92" fill="#ffffff" fill-opacity="0.85" font-size="12" text-anchor="middle">★</text>

    <!-- msg: Ada -->
    <rect x="648" y="126" width="28" height="28" rx="6" fill="#4a8a3f"/>
    <text x="662" y="145" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">A</text>
    <text x="684" y="138" fill="#1d1c1d" font-size="11.5" font-weight="700">Ada Lovelace</text>
    <text x="760" y="138" fill="#8a8a90" font-size="9.5">9:24</text>
    <text x="684" y="153" fill="#1d1c1d" font-size="11">Does this count the England</text>
    <text x="684" y="167" fill="#1d1c1d" font-size="11">series, or the live table?</text>

    <!-- msg: Nat + reactions -->
    <rect x="648" y="184" width="28" height="28" rx="6" fill="#3f6db5"/>
    <text x="662" y="203" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">N</text>
    <text x="684" y="196" fill="#1d1c1d" font-size="11.5" font-weight="700">Nat</text>
    <text x="712" y="196" fill="#8a8a90" font-size="9.5">9:26</text>
    <text x="684" y="211" fill="#1d1c1d" font-size="11">Just the live table — the ICC</text>
    <text x="684" y="225" fill="#1d1c1d" font-size="11">update posts tomorrow.</text>
    <rect x="684" y="233" width="44" height="18" rx="9" fill="#e8f5fa" stroke="#1264a3"/>
    <text x="693" y="246" font-size="10.5">👍</text>
    <text x="718" y="246" fill="#0b5394" font-size="10.5" font-weight="700" text-anchor="middle">2</text>
    <rect x="734" y="233" width="40" height="18" rx="9" fill="#f6f6f6" stroke="#e6e6e6"/>
    <text x="743" y="246" font-size="10.5">🏏</text>
    <text x="766" y="246" fill="#1d1c1d" font-size="10.5" font-weight="700" text-anchor="middle">1</text>

    <!-- msg: Ravi + mention -->
    <rect x="648" y="266" width="28" height="28" rx="6" fill="#b5643f"/>
    <text x="662" y="285" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">R</text>
    <text x="684" y="278" fill="#1d1c1d" font-size="11.5" font-weight="700">Ravi Kumar</text>
    <text x="754" y="278" fill="#8a8a90" font-size="9.5">9:31</text>
    <rect x="684" y="286" width="36" height="15" rx="4" fill="#ede1f0"/>
    <text x="689" y="298" fill="#611f69" font-size="11" font-weight="600">@Ada</text>
    <text x="724" y="298" fill="#1d1c1d" font-size="11">thanks, cleared it up.</text>

    <!-- panel composer -->
    <line x1="634" y1="500" x2="930" y2="500" stroke="#eaeaee"/>
    <rect x="648" y="512" width="234" height="30" rx="8" fill="#fff" stroke="#d9d3d9"/>
    <text x="660" y="531" fill="#8b8b8b" font-size="11">Message this page…</text>
    <rect x="890" y="514" width="26" height="26" rx="7" fill="#007a5a"/>
    <path d="M897 531 l13 -5 l-13 -5 l0 4 l8 1 l-8 1 z" fill="#ffffff"/>
  </g>

  <rect x="10" y="10" width="920" height="540" rx="12" fill="none" stroke="#deded7"/>
</svg>
