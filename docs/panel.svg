<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 580" width="380" height="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="PageThreads side panel, Aubergine theme (illustration)">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#140a06" flood-opacity="0.20"/>
    </filter>
    <clipPath id="panel"><rect x="10" y="10" width="360" height="560" rx="14"/></clipPath>
  </defs>

  <!-- page backdrop -->
  <rect width="380" height="580" fill="#f4f3f1"/>
  <rect x="10" y="10" width="360" height="560" rx="14" fill="#ffffff" filter="url(#shadow)"/>

  <g clip-path="url(#panel)">
    <rect x="10" y="10" width="360" height="560" fill="#ffffff"/>

    <!-- header bar (aubergine) -->
    <rect x="10" y="10" width="360" height="54" fill="#3f0e40"/>
    <text x="28" y="34" fill="#ffffff" font-size="15" font-weight="700">India lose No.1 T20I ranking</text>
    <text x="28" y="51" fill="#ffffff" fill-opacity="0.72" font-size="12">rediff.com · 5 messages</text>
    <text x="348" y="40" fill="#ffffff" fill-opacity="0.85" font-size="15" text-anchor="middle">★</text>

    <!-- message 1 : Ada -->
    <rect x="24" y="78" width="34" height="34" rx="7" fill="#4a8a3f"/>
    <text x="41" y="100" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">A</text>
    <text x="66" y="90" fill="#1d1c1d" font-size="14" font-weight="700">Ada Lovelace</text>
    <text x="156" y="90" fill="#616061" font-size="11">9:24 AM</text>
    <text x="66" y="108" fill="#1d1c1d" font-size="13.5">Wait — does this account for the</text>
    <text x="66" y="125" fill="#1d1c1d" font-size="13.5">England series, or the live table?</text>

    <!-- message 2 : Nat  (with hover toolbar + reactions) -->
    <rect x="24" y="150" width="34" height="34" rx="7" fill="#3f6db5"/>
    <text x="41" y="172" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">N</text>
    <text x="66" y="162" fill="#1d1c1d" font-size="14" font-weight="700">Nat</text>
    <text x="98" y="162" fill="#616061" font-size="11">9:26 AM</text>
    <text x="66" y="180" fill="#1d1c1d" font-size="13.5">Just the live table — the ICC</text>
    <text x="66" y="197" fill="#1d1c1d" font-size="13.5">update posts tomorrow.</text>

    <!-- hover action toolbar (top-right of the row) -->
    <rect x="262" y="150" width="90" height="24" rx="7" fill="#ffffff" stroke="#e6e6e6"/>
    <text x="278" y="167" font-size="13" text-anchor="middle">😀</text>
    <text x="307" y="167" fill="#1d1c1d" font-size="13" text-anchor="middle">✎</text>
    <text x="335" y="167" fill="#b3261e" font-size="13" text-anchor="middle">🗑</text>

    <!-- reaction pills -->
    <rect x="66" y="206" width="52" height="20" rx="10" fill="#e8f5fa" stroke="#1264a3"/>
    <text x="76" y="220" font-size="12">👍</text>
    <text x="104" y="220" fill="#0b5394" font-size="12" font-weight="700" text-anchor="middle">2</text>
    <rect x="124" y="206" width="46" height="20" rx="10" fill="#f6f6f6" stroke="#e6e6e6"/>
    <text x="134" y="220" font-size="12">🏏</text>
    <text x="159" y="220" fill="#1d1c1d" font-size="12" font-weight="700" text-anchor="middle">1</text>

    <!-- message 3 : grouped (no avatar / name), inline code -->
    <text x="66" y="256" fill="#1d1c1d" font-size="13.5">Source is</text>
    <rect x="123" y="245" width="150" height="16" rx="4" fill="#f4eef4"/>
    <text x="130" y="257" fill="#772f7a" font-size="12" font-family="ui-monospace, Menlo, monospace">GET /rankings?t20i</text>

    <!-- message 4 : Ravi with @mention -->
    <rect x="24" y="286" width="34" height="34" rx="7" fill="#b5643f"/>
    <text x="41" y="308" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">R</text>
    <text x="66" y="298" fill="#1d1c1d" font-size="14" font-weight="700">Ravi Kumar</text>
    <text x="152" y="298" fill="#616061" font-size="11">9:31 AM</text>
    <rect x="66" y="306" width="42" height="17" rx="4" fill="#ede1f0"/>
    <text x="72" y="319" fill="#611f69" font-size="13" font-weight="600">@Ada</text>
    <text x="112" y="319" fill="#1d1c1d" font-size="13.5">thanks, that clears it up.</text>

    <!-- composer -->
    <rect x="10" y="506" width="360" height="64" fill="#ffffff"/>
    <line x1="10" y1="506" x2="370" y2="506" stroke="#e6e6e6"/>
    <rect x="22" y="518" width="336" height="40" rx="9" fill="#ffffff" stroke="#d9d3d9"/>
    <text x="34" y="543" fill="#8b8b8b" font-size="13.5">Message this page…</text>
    <rect x="322" y="524" width="28" height="28" rx="7" fill="#007a5a"/>
    <path d="M330 544 l14 -6 l-14 -6 l0 4.5 l9 1.5 l-9 1.5 z" fill="#ffffff"/>
  </g>

  <rect x="10" y="10" width="360" height="560" rx="14" fill="none" stroke="#e4e1dc"/>
</svg>
